<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plată Portret Medieval - Turist în Transilvania</title>

    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .payment-container {
            text-align: center;
            padding: 40px 20px;
        }

        .payment-container i {
            font-size: 48px;
            color: #b78a48;
            margin-bottom: 20px;
        }

        .payment-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(183, 138, 72, 0.3);
            border-radius: 50%;
            border-top-color: #b78a48;
            animation: spin 1s ease-in-out infinite;
            margin: 20px 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header class="app-header">
            <div class="logo-container">
                <img src="assets/img/logo.png" alt="Turist în Transilvania Logo" class="logo">
            </div>
            <h1 class="app-title">Medieval Portrait</h1>
        </header>

        <main class="app-main">
            <div class="glass-panel" id="paymentPanel">
                <div class="payment-container" id="loadingState">
                    <i class="fas fa-magic"></i>
                    <h2 data-translate-key="paymentTitle">Pregătim magia...</h2>
                    <p data-translate-key="paymentDesc">Inițializăm conexiunea securizată cu procesatorul Netopia. Te
                        rugăm să aștepți.</p>
                    <div class="payment-spinner"></div>
                </div>

                <div class="payment-container hidden" id="errorState">
                    <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                    <h2>Eroare la inițializare</h2>
                    <p id="errorMessage">A apărut o problemă la generarea link-ului de plată. Te rugăm să verifici
                        linkul din WhatsApp.</p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-content">
                <p>&copy;
                    <script>document.write(new Date().getFullYear())</script> Turist în Transilvania.
                </p>
            </div>
        </footer>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/pay-whatsapp.js"></script>
</body>

</html>
