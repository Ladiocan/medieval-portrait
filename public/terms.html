      function applyTranslations(lang) {
        const dict = translations[lang] || translations.ro;
        
        // Daca exista elementul pentru titlu, actualizam:
        const titleEl = document.getElementById('page-title');
        if (titleEl) titleEl.textContent = dict.title;
        
        // Daca exista elementul de eticheta pentru limba, actualizam:
        const langLabelEl = document.getElementById('lang-label');
        if (langLabelEl && dict.label) langLabelEl.textContent = dict.label;
        
        // Afisam continutul:
        const contentEl = document.getElementById('termsContent');
        if (contentEl) contentEl.innerHTML = dict.content;
      }

      // Prevenim rularea inainte ca DOM-ul sa fie pregatit
      document.addEventListener("DOMContentLoaded", function () {
          const params = new URLSearchParams(window.location.search);
          const initialLang = params.get('lang') || document.documentElement.lang || 'ro';
          const select = document.getElementById('lang');
          
          if (select) {
              select.value = initialLang;
              select.addEventListener('change', (e) => {
                  applyTranslations(e.target.value);
              });
          }
          applyTranslations(initialLang);
      });
    </script>
