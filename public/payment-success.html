<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plată Confirmată | Medieval Portrait</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f4d03f;
            font-family: 'Lora', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                              linear-gradient(135deg, #290606, #1a1a1a);
            background-size: cover;
            background-position: center;
        }
        .container {
            background-color: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border: 2px solid #8b7355;
            border-radius: 8px;
            max-width: 600px;
            margin: 1rem;
            box-shadow: 0 0 20px rgba(244, 208, 63, 0.2);
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #dcdcdc;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #8b7355;
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            border: 1px solid #d4af37;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #d4af37;
            color: #000;
        }
        .icon-success {
            font-size: 5rem;
            color: #2ecc71;
            margin-bottom: 20px;
        }
    </style>
    <script>
        // Detect language from URL or referrer
        function getLang() {
            const params = new URLSearchParams(window.location.search);
            return params.get('lang') || 'ro';
        }

        const texts = {
            ro: {
                title: 'Tranzacție Realizată',
                message: 'Plata ta pentru portret a fost procesată cu succes.<br>Acum poți genera un nou portret direct pe site sau te poți întoarce pe WhatsApp.',
                button: 'Întoarce-te pe WhatsApp',
                generateBtn: '🎨 Generează portretul pe site',
                pageTitle: 'Plată Confirmată | Medieval Portrait'
            },
            en: {
                title: 'Transaction Complete',
                message: 'Your portrait payment was successfully processed.<br>You can now generate a new portrait on the site or return to WhatsApp.',
                button: 'Return to WhatsApp',
                generateBtn: '🎨 Generate portrait on site',
                pageTitle: 'Payment Confirmed | Medieval Portrait'
            },
            de: {
                title: 'Transaktion Abgeschlossen',
                message: 'Ihre Porträtzahlung wurde erfolgreich verarbeitet.<br>Sie können jetzt ein neues Porträt auf der Website generieren oder zu WhatsApp zurückkehren.',
                button: 'Zurück zu WhatsApp',
                generateBtn: '🎨 Porträt auf der Website erstellen',
                pageTitle: 'Zahlung Bestätigt | Medieval Portrait'
            },
            hu: {
                title: 'Tranzakció Sikeres',
                message: 'A portréfizetés sikeresen feldolgozva.<br>Most készíthetsz egy új portrét az oldalon, vagy visszatérhetsz a WhatsApp-ra.',
                button: 'Vissza a WhatsApp-ra',
                generateBtn: '🎨 Portré készítése az oldalon',
                pageTitle: 'Fizetés Megerősítve | Medieval Portrait'
            },
            es: {
                title: 'Transacción Completada',
                message: 'Tu pago por el retrato se procesó con éxito.<br>Ahora puedes generar un nuevo retrato en el sitio o volver a WhatsApp.',
                button: 'Volver a WhatsApp',
                generateBtn: '🎨 Generar retrato en el sitio',
                pageTitle: 'Pago Confirmado | Medieval Portrait'
            },
            fr: {
                title: 'Transaction Réalisée',
                message: 'Votre paiement pour le portrait a été traité avec succès.<br>Vous pouvez maintenant générer un nouveau portrait sur le site ou retourner sur WhatsApp.',
                button: 'Retour sur WhatsApp',
                generateBtn: '🎨 Générer le portrait sur le site',
                pageTitle: 'Paiement Confirmé | Medieval Portrait'
            },
            it: {
                title: 'Transazione Completata',
                message: 'Il pagamento per il tuo ritratto è stato elaborato con successo.<br>Ora puoi generare un nuovo ritratto sul sito o tornare su WhatsApp.',
                button: 'Torna su WhatsApp',
                generateBtn: '🎨 Genera il ritratto sul sito',
                pageTitle: 'Pagamento Confermato | Medieval Portrait'
            },
            pl: {
                title: 'Transakcja Zakończona',
                message: 'Płatność za portret została pomyślnie przetworzona.<br>Teraz możesz wygenerować nowy portret na stronie lub wrócić na WhatsApp.',
                button: 'Wróć na WhatsApp',
                generateBtn: '🎨 Wygeneruj portret na stronie',
                pageTitle: 'Płatność Potwierdzona | Medieval Portrait'
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const lang = getLang();
            const t = texts[lang] || texts.ro;

            document.getElementById('title').innerHTML = t.title;
            document.getElementById('message').innerHTML = t.message;
            document.getElementById('whatsappBtn').textContent = t.button;
            document.getElementById('generateBtnText').textContent = t.generateBtn.replace('🎨 ', '');
            document.getElementById('generateBtn').href = 'portrait.html?lang=' + lang;
            document.title = t.pageTitle;

            // After successful payment, unlock the website generation limit
            // so the user can generate a new portrait on portrait.html
            try {
                localStorage.removeItem('mp_generated');
            } catch (e) {
                // localStorage may be unavailable in some browsers
            }
        });
    </script>
</head>
<body>

<div class="container">
    <div class="icon-success">✔️</div>
    <h1 id="title">Tranzacție Realizată</h1>
    <p id="message">Plata ta pentru portret a fost procesată cu succes.<br>
    Te rugăm să te întorci în conversația de WhatsApp. Un nou mesaj îți va confirma pașii următori imediat ce sistemul nostru procesează statusul de la Netopia.</p>
    <div style="display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:10px">
        <a id="generateBtn" href="portrait.html" class="btn" style="background-color:#d4af37;color:#000;border-color:#d4af37;">🎨 <span id="generateBtnText">Generează portretul pe site</span></a>
        <a id="whatsappBtn" href="https://wa.me/40771229487" class="btn">Întoarce-te pe WhatsApp</a>
    </div>
</div>

</body>
</html>
