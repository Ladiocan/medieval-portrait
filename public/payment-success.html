<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plată Confirmată | Portret Medieval</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f4d03f;
            font-family: 'Lora', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('assets/img/hero-bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .container {
            background-color: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border: 2px solid #8b7355;
            border-radius: 8px;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(244, 208, 63, 0.2);
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #dcdcdc;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #8b7355;
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            border: 1px solid #d4af37;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #d4af37;
            color: #000;
        }
        .icon-success {
            font-size: 5rem;
            color: #2ecc71;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-success">✔️</div>
    <h1>Tranzacție Realizată</h1>
    <p>Plata tău pentru portret a fost procesată cu succes.<br>
    Te rugăm să te întorci în conversația de WhatsApp. Un nou mesaj îți va confirma pașii imediat ce sistemul nostru procesează statusul de la Netopia.</p>
    <a href="whatsapp://send?phone=+40700000000" class="btn">Întoarce-te pe WhatsApp</a>
</div>

</body>
</html>
